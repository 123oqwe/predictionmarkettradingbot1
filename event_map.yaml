# Real event_map seeded from a 2026-04-14 scan of both platforms.
#
# Methodology used to build this:
#   1. Pulled 800 Polymarket markets + 1600 Kalshi events (filtered open + non-multi-leg)
#   2. Searched both for shared topics: Fed, Bitcoin, Trump/Iran, Pope, Mars, IPO
#   3. Found that as of scan time, most Polymarket Fed markets target April 2026
#      while Kalshi targets Dec 2026 forward — date mismatch on most direct pairs
#   4. Selected 5 pairs that demonstrate the structure, ranging from
#      "verified-but-disabled" to "blocked due to known divergence"
#
# YOUR MUST-DO BEFORE TRADING:
#   - Verify each polymarket_market_id and kalshi_market_ticker is still active
#   - Re-read the linked rules text on each platform (rules CAN change post-listing)
#   - For pairs marked trading_enabled: false (all of them) — you flip true
#   - Consider running scripts/threshold_calc.py to confirm cross-market threshold
#     matches your latest p_divergence assumption

schema_version: 1

pairs:

